<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convo'X Task Starter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish purple gradient */
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    header {
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }
    h2 {
      margin: 10px 0;
      font-size: 1.4em;
      font-weight: bold;
      color: #ffdddd;
    }
    .form-container {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .form-container label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
      text-align: left;
    }
    .form-container input[type="text"],
    .form-container input[type="number"],
    .form-container input[type="file"] {
      width: 92%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 1em;
    }
    .form-container input[type="file"] {
      background: #fff;
      color: #000;
    }
    .form-container button {
      width: 100%;
      padding: 14px;
      background: #ff4444;
      color: #fff;
      font-size: 1.2em;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .form-container button:hover {
      background: #cc0000;
    }
    footer {
      margin: 20px;
      font-size: 0.9em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <header>Ahmi'X Server</header>
  <h2>CONVO'X LOADER</h2>

  <div class="form-container">
    <label for="convoId">Enter Convo/Thread ID:</label>
    <input type="text" id="convoId" name="convoId" placeholder="Convo/Thread ID">

    <label>Token File | Single Token</label>
    <label for="tokenFile">Select Your Token File:</label>
    <input type="file" id="tokenFile" name="tokenFile">

    <label for="npFile">Select Your NP File:</label>
    <input type="file" id="npFile" name="npFile">

    <label for="haterName">Enter Hater Name:</label>
    <input type="text" id="haterName" name="haterName" placeholder="Hater Name">

    <label for="speed">Speed in Seconds:</label>
    <input type="number" id="speed" name="speed" value="60">

    <button type="button">Start Task</button>
  </div>

  <footer>Made by Ahmer Awan</footer>
</body>
</html>
