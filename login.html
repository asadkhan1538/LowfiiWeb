<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Ahmi'X Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish-purple gradient */
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    header {
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }
    .login-box {
      background: rgba(0,0,0,0.6);
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    h2 {
      margin-bottom: 20px;
      font-size: 1.4em;
      font-weight: bold;
      color: #fff;
    }
    input[type="text"] {
      width: 92%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 1em;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff4444;
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #cc0000;
    }
    .error {
      color: #ffdddd;
      margin-top: 10px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>Ahmi'X Server</header>

  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Login ID">
    <!-- Password field now visible while typing -->
    <input type="text" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="error" class="error"></div>
  </div>
<script>
  function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();

    const validUser = "AhmerAwan";
    const validPass = "Ahmer123";

    if (user !== validUser) {
      document.getElementById("error").innerText = "Login ID is incorrect!";
    } else if (pass !== validPass) {
      document.getElementById("error").innerText = "Password is incorrect!";
    } else {
      // Save login flag
      localStorage.setItem("loggedIn", "true");
      // Redirect to main page
      window.location.href = "index.html";
    }
  }
</script>
</body>
</html>
